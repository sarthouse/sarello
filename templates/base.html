<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sarello ERP{% endblock %}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Compiled CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <link rel="stylesheet" href="{% static 'css/theme-output.css' %}">
    
    <!-- HTMX and Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- App scripts -->
    <script defer src="{% static 'js/app.js' %}"></script>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-[var(--bg)] text-[var(--text)] font-[var(--sans)]" x-data>
    {% if user.is_authenticated %}
        {% include 'partials/navbar.html' %}
    {% else %}
        <nav class="bg-[var(--surface)] border-b border-[var(--border)]">
            <div class="container mx-auto px-4 h-16 flex items-center">
                <a href="/" class="text-xl font-bold">Sarello ERP</a>
            </div>
        </nav>
    {% endif %}

    <main class="container mx-auto px-4 py-6">
        {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <div class="p-4 mb-2 rounded border
                {% if message.tags == 'success' %}bg-[var(--success)]/10 text-[var(--success)] border-[var(--success)]/30
                {% elif message.tags == 'error' %}bg-[var(--danger)]/10 text-[var(--danger)] border-[var(--danger)]/30
                {% else %}bg-[var(--accent)]/10 text-[var(--accent)] border-[var(--accent)]/30{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
