{% extends 'base.html' %}

{% block title %}Eliminar Contacto{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'contactos:lista' %}" class="text-primary hover:text-primary/80">
        <i class="fas fa-arrow-left mr-2"></i>Volver
    </a>
</div>

<div class="max-w-2xl mx-auto">
    <div class="bg-base-200 rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-4">Eliminar Contacto</h1>
        <p class="text-base-content mb-4">¿Está seguro de eliminar <strong>{{ contacto.nombre }}</strong> ({{ contacto.codigo }})?</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="flex gap-2">
                <button type="submit" class="bg-error text-white px-4 py-2 rounded hover:bg-error/80">
                    <i class="fas fa-trash mr-2"></i>Eliminar
                </button>
                <a href="{% url 'contactos:lista' %}" class="bg-base-300 text-base-content px-4 py-2 rounded hover:bg-base-300/80">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
