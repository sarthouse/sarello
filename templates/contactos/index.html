{% extends 'base.html' %}

{% block title %}Contactos{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-3xl font-bold text-base-content/80">Contactos</h1>
    <p class="text-base-content/60">Clientes y proveedores</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <a href="{% url 'contactos:lista' %}" class="block p-6 bg-base-200 rounded-lg shadow hover:shadow-lg transition">
        <div class="flex items-center justify-between">
            <div>
                <h2 class="text-xl font-semibold">Todos los Contactos</h2>
                <p class="text-base-content/60 text-sm">Ver lista completa</p>
            </div>
            <i class="fas fa-users text-4xl text-primary"></i>
        </div>
    </a>

    <a href="{% url 'contactos:lista' %}?tipo=cliente" class="block p-6 bg-base-200 rounded-lg shadow hover:shadow-lg transition">
        <div class="flex items-center justify-between">
            <div>
                <h2 class="text-xl font-semibold">Clientes</h2>
                <p class="text-base-content/60 text-sm">Solo clientes</p>
            </div>
            <i class="fas fa-user text-4xl text-success"></i>
        </div>
    </a>

    <a href="{% url 'contactos:lista' %}?tipo=proveedor" class="block p-6 bg-base-200 rounded-lg shadow hover:shadow-lg transition">
        <div class="flex items-center justify-between">
            <div>
                <h2 class="text-xl font-semibold">Proveedores</h2>
                <p class="text-base-content/60 text-sm">Solo proveedores</p>
            </div>
            <i class="fas fa-truck text-4xl text-warning"></i>
        </div>
    </a>
</div>
{% endblock %}
