{% extends 'base.html' %}

{% block title %}Eliminar Tipo de Impuesto{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'contabilidad:impuestos_tipos' %}" class="text-primary hover:text-primary/80">
        <i class="fas fa-arrow-left mr-2"></i>Volver
    </a>
</div>

<div class="max-w-2xl mx-auto">
    <div class="bg-base-200 rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-4">Eliminar Tipo de Impuesto</h1>
        <p class="text-base-content mb-4">¿Está seguro de eliminar <strong>{{ tipo.nombre }}</strong>?</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="flex gap-2">
                <button type="submit" class="btn-error">
                    <i class="fas fa-trash mr-2"></i>Eliminar
                </button>
                <a href="{% url 'contabilidad:impuestos_tipos' %}" class="btn-ghost">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
