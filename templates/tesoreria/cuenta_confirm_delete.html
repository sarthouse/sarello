{% extends 'base.html' %}

{% block title %}Eliminar Cuenta{% endblock %}

{% block content %}
{% include "components/page-header.html" with title="Eliminar Cuenta" back_url="tesoreria:cuentas" %}

<div class="max-w-2xl mx-auto">
    <div class="bg-base-200 rounded-lg shadow p-6">
        <p class="text-base-content mb-4">¿Está seguro de eliminar <strong>{{ cuenta.nombre }}</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <div class="flex gap-2">
                <button type="submit" class="btn-error">
                    <i class="fas fa-trash mr-2"></i>Eliminar
                </button>
                <a href="{% url 'tesoreria:cuentas' %}" class="btn-ghost">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
