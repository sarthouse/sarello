{% extends 'base.html' %}

{% block title %}Registrar Ingreso{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'tesoreria:index' %}" class="text-primary hover:text-primary-focus">
        <i class="fas fa-arrow-left mr-2"></i>Volver
    </a>
</div>

<div class="max-w-2xl mx-auto">
    <div class="bg-base-200 rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-6 text-base-content">
            <i class="fas fa-arrow-down text-success mr-2"></i>Registrar Ingreso
        </h1>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-base-content mb-1">Cuenta</label>
                    {{ form.cuenta }}
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-base-content mb-1">Importe</label>
                    {{ form.importe }}
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-base-content mb-1">Fecha</label>
                    {{ form.fecha }}
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-base-content mb-1">Descripción</label>
                    {{ form.descripcion }}
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-base-content mb-1">Cliente/Contacto</label>
                    {{ form.contacto }}
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-base-content mb-1">Observaciones</label>
                    {{ form.observaciones }}
                </div>
            </div>
            
            <div class="mt-6 flex gap-2">
                <button type="submit" class="bg-success text-white px-4 py-2 rounded hover:bg-success/90">
                    <i class="fas fa-save mr-2"></i>Guardar
                </button>
                <a href="{% url 'tesoreria:index' %}" class="bg-base-300 text-base-content px-4 py-2 rounded hover:bg-base-content/20">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
