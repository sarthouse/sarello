{# Modal Component #}
{# Usage:
  {% include "components/modal.html" with modal_id="delete-confirm" title="Confirmar eliminación" %}
    ¿Desea eliminar este elemento?
  {% endinclude %}
#}

<div id="{{ modal_id|default:'modal' }}" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50" data-modal>
    <div class="bg-white rounded-lg shadow-lg max-w-md w-full mx-4" role="dialog" aria-modal="true">
        {% if title %}
        <div class="border-b px-6 py-4">
            <h2 class="text-lg font-semibold text-gray-900">{{ title }}</h2>
        </div>
        {% endif %}
        
        <div class="px-6 py-4">
            {{ content }}
        </div>
        
        {% if show_actions %}
        <div class="border-t px-6 py-4 flex justify-end gap-2">
            <button class="btn btn-ghost" data-close-modal>Cancelar</button>
            <button class="btn btn-primary" data-confirm-modal>{{ confirm_label|default:"Confirmar" }}</button>
        </div>
        {% endif %}
    </div>
</div>
