{% with type=type|default:"text" required=required|default:False error=error|default:"" %}
<div class="form-field">
    {% if label %}
    <label class="block text-sm font-medium text-base-content mb-1" for="{{ name }}">
        {{ label }}
        {% if required %}<span class="text-error">*</span>{% endif %}
    </label>
    {% endif %}
    
    <input 
        type="{{ type }}" 
        name="{{ name }}" 
        id="{{ name }}"
        value="{{ value|default:'' }}"
        placeholder="{{ placeholder|default:'' }}"
        class="input input-bordered w-full bg-base-100 text-base-content {% if error %}input-error{% endif %}"
        {% if required %}required{% endif %}
        {% if readonly %}readonly{% endif %}>
    
    {% if help_text %}
    <p class="mt-1 text-sm text-base-content/60">{{ help_text }}</p>
    {% endif %}
    
    {% if error %}
    <p class="mt-1 text-sm text-error">{{ error }}</p>
    {% endif %}
</div>
{% endwith %}
