
{% block content %}
<div class="form-control">
    {% if label %}
    <label class="label" for="{{ field.id_for_label }}">
        <span class="label-text font-medium">{{ label }}</span>
        {% if field.field.required %}<span class="label-text-alt text-error">*</span>{% endif %}
    </label>
    {% endif %}
    
    {{ field }}
    
    {% if field.help_text %}
    <label class="label">
        <span class="label-text-alt text-base-content/60">{{ field.help_text|safe }}</span>
    </label>
    {% endif %}
    
    {% if field.errors %}
    <label class="label">
        {% for error in field.errors %}
        <span class="label-text-alt text-error">{{ error }}</span>
        {% endfor %}
    </label>
    {% endif %}
</div>
{% endblock %}
