{# components/forms/filter-bar.html #}
{# Usage: {% include "components/forms/filter-bar.html" with filters=filter_fields %} #}
{# Or render fields directly in the slot between the form tags #}
<form method="get" class="mb-4 bg-base-200 p-4 rounded-lg shadow">
    <div class="flex flex-wrap items-center gap-4">
        {{ slot }}
        <button type="submit" class="btn-primary">
            <i class="fas fa-search mr-2"></i>Buscar
        </button>
        <a href="{{ clear_url|default:request.path }}" class="btn-ghost">
            Limpiar
        </a>
    </div>
</form>
