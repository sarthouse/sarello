
{% with required=required|default:False %}
<div class="form-field">
    {% if label %}
    <label class="block text-sm font-medium text-gray-700 mb-1" for="{{ name }}">
        {{ label }}
        {% if required %}<span class="text-red-500">*</span>{% endif %}
    </label>
    {% endif %}
    
    <select 
        name="{{ name }}" 
        id="{{ name }}"
        class="select select-bordered w-full {% if error %}select-error{% endif %}"
        {% if required %}required{% endif %}
        {% if disabled %}disabled{% endif %}>
        {% if not required %}
        <option value="">-- Seleccionar --</option>
        {% endif %}
        {% for choice_value, choice_label in choices %}
        <option value="{{ choice_value }}" {% if choice_value == value %}selected{% endif %}>
            {{ choice_label }}
        </option>
        {% endfor %}
    </select>
    
    {% if help_text %}
    <p class="mt-1 text-sm text-gray-500">{{ help_text }}</p>
    {% endif %}
    
    {% if error %}
    <p class="mt-1 text-sm text-red-600">{{ error }}</p>
    {% endif %}
</div>
{% endwith %}
