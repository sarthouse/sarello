
<div class="text-center py-12">
    {% if icon %}
    <i class="fas {{ icon }} text-4xl text-gray-400 mb-3"></i>
    {% endif %}
    
    {% if title %}
    <h3 class="text-lg font-medium text-gray-900 mb-1">{{ title }}</h3>
    {% endif %}
    
    {% if description %}
    <p class="text-gray-500 mb-4">{{ description }}</p>
    {% endif %}
    
    {% if action_url %}
    <a href="{{ action_url }}" class="inline-block bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
        {% if action_icon %}<i class="fas {{ action_icon }} mr-2"></i>{% endif %}
        {{ action_label|default:"Crear" }}
    </a>
    {% endif %}
</div>
