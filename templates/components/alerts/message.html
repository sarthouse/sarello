{% load static %}


<div class="mb-4">
    {% for message in messages %}
    <div class="p-4 mb-2 rounded border
        {% if message.tags == 'success' %}bg-success/10 text-success border-success/30
        {% elif message.tags == 'error' %}bg-error/10 text-error border-error/30
        {% else %}bg-accent/10 text-accent border-accent/30{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
