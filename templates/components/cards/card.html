<div class="bg-base-200 rounded-lg shadow overflow-hidden">
    {% if title %}
    <div class="bg-base-300 px-6 py-4 border-b border-base-300">
        <h2 class="text-lg font-semibold text-base-content">{{ title }}</h2>
        {% if subtitle %}<p class="text-sm text-base-content/60 mt-1">{{ subtitle }}</p>{% endif %}
    </div>
    {% endif %}
    <div class="px-6 py-4">
        {{ content }}
    </div>
    {% if footer %}
    <div class="bg-base-300 px-6 py-4 border-t border-base-300">
        {{ footer }}
    </div>
    {% endif %}
</div>
