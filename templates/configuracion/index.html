{% extends 'base.html' %}

{% block title %}Configuración{% endblock %}

{% block content %}
{% include "components/page-header.html" with title="Configuración" subtitle="Parámetros del sistema y datos de la empresa" %}

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <a href="{% url 'configuracion:parametros' %}" class="block p-6 bg-base-200 rounded-lg shadow hover:shadow-lg transition">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-sm text-base-content/60">Parámetros</p>
                <p class="text-2xl font-bold text-base-content">Configurar</p>
            </div>
            <i class="fas fa-cog text-4xl text-primary"></i>
        </div>
    </a>

    <a href="{% url 'configuracion:datos_empresa' %}" class="block p-6 bg-base-200 rounded-lg shadow hover:shadow-lg transition">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-sm text-base-content/60">Datos de la Empresa</p>
                <p class="text-2xl font-bold text-base-content">Editar</p>
            </div>
            <i class="fas fa-building text-4xl text-success"></i>
        </div>
    </a>
</div>
{% endblock %}
